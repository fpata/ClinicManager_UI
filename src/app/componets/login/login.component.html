<div class="login-page min-vh-100 d-flex align-items-center justify-content-center">
  <div class="login-card shadow border-0 rounded-4">
    <!-- Header with Gradient and Brand Icon -->
    <div class="login-header text-center text-white py-4 px-3">
      <div class="brand-icon mb-2">
        <i class="bi bi-hospital fs-1 text-white"></i>
      </div>
      <h3 class="fw-bold mb-1">Clinic Manager</h3>
      <p class="mb-0 text-white-50 small">Sign in to your account</p>
    </div>

    <!-- Form Section -->
    <div class="login-body p-4 bg-white">
      <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">
        <!-- Username input -->
        <div class="form-group mb-3">
          <label for="username" class="form-label d-flex align-items-center gap-1">
            <i class="bi bi-person text-primary"></i> Username
          </label>
          <input type="text" id="username" class="form-control form-control-lg" [(ngModel)]="username" name="username" 
            required placeholder="Enter your username">
        </div>

        <!-- Password input -->
        <div class="form-group mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label mb-0 d-flex align-items-center gap-1">
              <i class="bi bi-lock text-primary"></i> Password
            </label>
            <a [routerLink]="['/login/forgotpassword']" class="small text-decoration-none">Forgot Password?</a>
          </div>
          <input type="password" id="password" class="form-control form-control-lg" [(ngModel)]="password" name="password" 
            required placeholder="Enter your password">
        </div>

        <!-- Error Alert -->
        @if(error){
        <div class="alert alert-danger mb-3 py-2 px-3 align-items-center border-0 rounded-3">
          <i class="bi bi-exclamation-triangle-fill fs-5"></i>
          <span class="small">{{ error }}</span>
        </div>
        }

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2 py-2.5">
          <i class="bi bi-box-arrow-in-right me-1"></i> Log In
        </button>
      </form>
    </div>
  </div>
</div>
