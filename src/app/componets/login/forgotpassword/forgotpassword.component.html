<div class="forgot-password-page min-vh-100 d-flex align-items-center justify-content-center">
  <div class="forgot-password-card shadow border-0 rounded-4">
    <!-- Header with Gradient and Brand Icon -->
    <div class="forgot-password-header text-center text-white py-4 px-3">
      <div class="brand-icon mb-2">
        <i class="bi bi-key fs-1 text-white"></i>
      </div>
      <h3 class="fw-bold mb-1">Forgot Password</h3>
      <p class="mb-0 text-white-50 small">Enter details to reset access</p>
    </div>

    <!-- Form Section -->
    <div class="forgot-password-body p-4 bg-white">
      <form class="forgot-password-form">
        <!-- Email Input -->
        <div class="form-group mb-3">
          <label for="email" class="form-label d-flex align-items-center gap-1">
            <i class="bi bi-envelope text-primary"></i> Email Address
          </label>
          <input type="email" id="email" class="form-control form-control-lg" name="email" [(ngModel)]="email" 
            required placeholder="Enter registered email">
        </div>

        <!-- OR separator -->
        <div class="d-flex align-items-center my-3">
          <hr class="flex-grow-1 border-secondary opacity-25">
          <span class="px-2 text-muted small fw-bold">OR</span>
          <hr class="flex-grow-1 border-secondary opacity-25">
        </div>

        <!-- Mobile Input -->
        <div class="form-group mb-4">
          <label for="mobile" class="form-label d-flex align-items-center gap-1">
            <i class="bi bi-phone text-primary"></i> Mobile Number
          </label>
          <input type="text" id="mobile" class="form-control form-control-lg" name="mobile" [(ngModel)]="mobile" 
            required placeholder="Enter registered mobile">
        </div>

        <!-- Error Alert -->
        @if(error){
        <div class="alert alert-danger mb-3 py-2 px-3 align-items-center border-0 rounded-3">
          <i class="bi bi-exclamation-triangle-fill fs-5"></i>
          <span class="small">{{ error }}</span>
        </div>
        }

        <!-- Submit Button -->
        <button type="button" class="btn btn-primary btn-lg w-100 py-2.5" (click)="resetPassword()">
          <i class="bi bi-arrow-clockwise me-1"></i> Reset Password
        </button>

        <!-- Back to Login -->
        <div class="text-center mt-3">
          <a [routerLink]="['/login']" class="small text-decoration-none d-inline-flex align-items-center gap-1">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
